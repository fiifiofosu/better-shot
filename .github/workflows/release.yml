name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            label: apple-silicon
            dmg_suffix: aarch64
          - arch: x86_64
            label: intel
            dmg_suffix: x86_64

    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild -scheme BetterShot \
            -configuration Release \
            -arch ${{ matrix.arch }} \
            -derivedDataPath build \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/BetterShot.app"
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="BetterShot-${VERSION}_${{ matrix.dmg_suffix }}.dmg"

          mkdir -p dmg_staging
          cp -R "$APP_PATH" dmg_staging/
          ln -s /Applications dmg_staging/Applications

          hdiutil create -volname "BetterShot" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV
          echo "DMG_PATH=$(pwd)/$DMG_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.label }}
          path: ${{ env.DMG_PATH }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --pretty=format:"- %s" --reverse)
          else
            COMMITS=$(git log "$PREV_TAG".."$TAG_NAME" --oneline --pretty=format:"- %s" --reverse)
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "${COMMITS:-No changes documented}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "BetterShot ${{ github.ref_name }}"
          body: |
            ## Downloads

            | Platform | Download |
            |----------|----------|
            | macOS Apple Silicon (M1–M5) | `BetterShot-*_aarch64.dmg` |
            | macOS Intel | `BetterShot-*_x86_64.dmg` |

            ## Install

            1. Download the DMG for your Mac
            2. Open the DMG, drag BetterShot to Applications
            3. Launch and grant Screen Recording + Accessibility permissions

            ## Changes

            ${{ steps.notes.outputs.notes }}
          files: artifacts/*.dmg
          draft: false
          prerelease: false
